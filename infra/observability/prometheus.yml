# Prometheus scrape config for RedeCrystal. Backend services expose
# /actuator/prometheus (Micrometer); kafka-exporter exposes broker/lag metrics.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['core-service:8081']
        labels: {service: core-service}
      - targets: ['api-gateway:8080']
        labels: {service: api-gateway}
      - targets: ['eureka-server:8761']
        labels: {service: eureka-server}

  - job_name: kafka
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
