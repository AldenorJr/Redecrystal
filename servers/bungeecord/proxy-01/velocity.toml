# RedeCrystal — Velocity proxy (proxy-01). Modern forwarding with a shared secret.
config-version = "2.8"
bind = "0.0.0.0:25565"
motd = "  <gradient:#b14aed:#8e2de2><bold>REDECRYSTAL</bold></gradient> <dark_gray>»</dark_gray> <#c9a6ff>A sua aventura começa aqui\n  <#a335ee>✧ <white>Novidades, eventos e muito mais <#a335ee>✧"
show-max-players = 500
# Cracked/offline network for the dev slice (no Mojang auth required).
online-mode = false
force-key-authentication = false
# Cracked dev slice: "none" proxies straight through to offline-mode Paper
# servers — no per-server Paper config needed. Switch to "modern" + a shared
# secret (proxies.velocity in paper-global.yml) when hardening for production.
player-info-forwarding-mode = "none"
announce-forge = false
forced-hosts = {}

[servers]
	login = "login-01:25565"
	# Lobby servers are NOT listed here — crystal-bungee discovers and registers
	# the whole lobby fleet dynamically from the Service Discovery registry.
	# New players land on login first; the proxy then routes them to a lobby.
	try = ["login"]

[advanced]
	compression-threshold = 256
	compression-level = -1
	login-ratelimit = 0
	connection-timeout = 5000
	read-timeout = 30000
	proxy-protocol = false

[query]
	enabled = false

[packet-limiter]
	#Size of the moving time window in seconds used to calculate average rates.
	#A larger window tolerates short bursts while still enforcing the configured limits over time.
	interval = 7
	#Maximum average number of packets per second a client may send. -1 disables this check.
	packets-per-second = -1
	#Maximum average number of compressed (on-wire) bytes per second a client may send. -1 disables this check.
	bytes-per-second = -1
	#Maximum average number of decompressed bytes per second a client may send.
	#Protects against compression bomb attacks where small packets expand to excessive sizes after decompression.
	#-1 disables this check.
	decompressed-bytes-per-second = 5242880
