name: CrystalParkour
version: 0.2.0
main: com.redecrystal.parkour.CrystalParkourPlugin
api-version: '1.21'
author: RedeCrystal
description: Plate-driven in-lobby parkour (start/checkpoint/finish plates) with a minigame hotbar, finish hologram and best-time leaderboard.
commands:
  parkour:
    description: Play the lobby parkour
    aliases: [pk]
permissions:
  crystal.parkour.admin:
    description: Configure the parkour course
    default: op
