api-version: '1.21'
author: RedeCrystal
description: In-lobby parkour with a configurable course and best-time leaderboard.
commands:
  parkour:
    description: Play the lobby parkour
    aliases: [pk]
permissions:
  crystal.parkour.admin:
    description: Configure the parkour course
    default: op
